name: Build & Deploy

# YouTube reference (optional)
# https://www.youtube.com/watch?v=fWUkPgBN-58&t=665s

on:
  push:
    branches:
      - main   # agar main branch me change hoga to workflow chalega
      - dugu   # additional branch (optional)

env:
  CI: false   # agar true hoga to warning par bhi build fail ho sakta hai (prod me usually true rakhte hain)

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest   # GitHub ka Linux runner

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2   # repo code pull karega

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: 16   # yaha Node version set karte hain

      - name: Install dependencies
        uses: bahmutov/npm-install@v1   # npm install run karega

      - name: Build project
        run: npm run build   # React build create karega

      - name: Upload production-ready build files
        uses: actions/upload-artifact@v2
        with:
          name: production-files   # artifact ka naam
          path: ./build           # build folder upload hoga

  deploy:
    name: Deploy
    needs: build   # build job complete hone ke baad hi chalega
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # sirf main branch par deploy karega

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v2
        with:
          name: production-files
          path: ./build   # build folder download karega

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.TOKEN }}   # repo settings me secret banana padta hai
          publish_dir: ./build   # yahi folder deploy hoga
